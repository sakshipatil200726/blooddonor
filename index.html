<!DOCTYPE html>
<html>
<head>
  <title>Blood Donor Registry</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

</head>

<body>

  <h1>Blood Donor & Patient Registry</h1>

  <div class="box">

    <h2>Register Donor</h2>

    <input type="text" id="name" placeholder="Name">

    <select id="blood">
      <option>A+</option>
      <option>A-</option>
      <option>B+</option>
      <option>B-</option>
      <option>O+</option>
      <option>O-</option>
      <option>AB+</option>
      <option>AB-</option>
    </select>

    <input type="text" id="city" placeholder="City">

    <input type="number" id="phone" placeholder="Phone">

    <button onclick="registerDonor()">
      Register
    </button>

  </div>

  <div class="box">

    <h2>Search Donor</h2>

    <select id="searchBlood">
      <option>A+</option>
      <option>A-</option>
      <option>B+</option>
      <option>B-</option>
      <option>O+</option>
      <option>O-</option>
      <option>AB+</option>
      <option>AB-</option>
    </select>

    <input type="text" id="searchCity" placeholder="City">

    <button onclick="searchDonor()">
      Search
    </button>

  </div>

  <div id="result"></div>

  <script type="module" src="firebase.js"></script>

</body>
</html>
